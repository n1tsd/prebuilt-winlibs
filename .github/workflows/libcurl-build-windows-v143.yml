# Build libcurl + curl.exe for Win32 and x64 with MSVC platform toolset v143.
# Uses official curl sources + CMake (Visual Studio 17 2022 generator, -T v143).
# TLS: Schannel (no OpenSSL). Runner: windows-latest.

name: libcurl Windows v143

on:
  repository_dispatch:
  workflow_dispatch:

env:
  CURL_REPO: curl/curl
  # Use a release tag for reproducible builds, e.g. curl-8_11_0
  CURL_REF: curl-8_11_0
  UPLOAD_ARTIFACT: true
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout curl
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CURL_REPO }}
          ref: ${{ env.CURL_REF }}
          path: curl

      - name: Install Visual Studio 2022 Build Tools (C++, MSVC v143)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $bootstrapper = Join-Path $env:TEMP "vs_BuildTools.exe"
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_BuildTools.exe" -OutFile $bootstrapper -UseBasicParsing
          Write-Host "Installing VS 2022 Build Tools (default path; first run can take 15-25 minutes)"
          $args = @(
            "--quiet", "--wait", "--norestart", "--nocache",
            "--add", "Microsoft.VisualStudio.Workload.VCTools",
            "--add", "Microsoft.VisualStudio.Component.VC.Tools.x86.x64",
            "--add", "Microsoft.VisualStudio.Component.VC.v143.x86.x64"
          )
          $p = Start-Process -FilePath $bootstrapper -ArgumentList $args -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -notin 0, 3010) {
            throw "vs_BuildTools.exe exited with $($p.ExitCode)"
          }
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $root = & $vswhere -latest -products Microsoft.VisualStudio.Product.BuildTools `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $root) {
            throw "vswhere: no VS 2022 Build Tools with VC.Tools.x86.x64 (install may have failed or skipped C++)."
          }
          $vcvars32 = Join-Path $root "VC\Auxiliary\Build\vcvars32.bat"
          if (-not (Test-Path $vcvars32)) {
            throw "Missing VC toolchain: $vcvars32"
          }
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "VS_INST=$root"
          Write-Host "Build will use VS_INST=$root"

      - name: Build libcurl (mt/mtd/md/mdd, static + dll, Win32 + x64, toolset v143)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:GITHUB_WORKSPACE
          $src = Join-Path $root "curl"
          $gen = "Visual Studio 17 2022"
          $toolset = "v143"
          if (-not $env:VS_INST) { throw "VS_INST not set" }

          $common = @(
            "-DCURL_USE_SCHANNEL=ON",
            "-DCURL_ENABLE_SSL=ON",
            "-DBUILD_TESTING=OFF",
            "-DBUILD_EXAMPLES=OFF",
            "-DENABLE_CURL_MANUAL=OFF",
            "-DBUILD_LIBCURL_DOCS=OFF",
            "-DBUILD_MISC_DOCS=OFF"
          )

          $targets = @(
            @{ Runtime = "mt";  RuntimeValue = "MultiThreaded";          Config = "Release" },
            @{ Runtime = "mtd"; RuntimeValue = "MultiThreadedDebug";     Config = "Debug"   },
            @{ Runtime = "md";  RuntimeValue = "MultiThreadedDLL";       Config = "Release" },
            @{ Runtime = "mdd"; RuntimeValue = "MultiThreadedDebugDLL";  Config = "Debug"   }
          )
          $archs = @(
            @{ Name = "Win32"; CmakeArch = "Win32" },
            @{ Name = "x64";   CmakeArch = "x64"   }
          )
          $kinds = @(
            @{ Name = "static"; Shared = "OFF" },
            @{ Name = "dll";    Shared = "ON"  }
          )

          foreach ($a in $archs) {
            foreach ($k in $kinds) {
              foreach ($t in $targets) {
                $key = "{0}-{1}-{2}" -f $a.Name.ToLowerInvariant(), $k.Name, $t.Runtime
                $bld = Join-Path $root ("build\" + $key)
                $stg = Join-Path $root ("stage\" + $key)

                $args = @(
                  "-S", $src,
                  "-B", $bld,
                  "-G", $gen,
                  "-A", $a.CmakeArch,
                  "-T", $toolset,
                  "-DCMAKE_GENERATOR_INSTANCE=$env:VS_INST",
                  "-DCMAKE_MSVC_RUNTIME_LIBRARY=$($t.RuntimeValue)",
                  "-DBUILD_SHARED_LIBS=$($k.Shared)",
                  "-DCMAKE_INSTALL_PREFIX=$stg"
                ) + $common

                & cmake @args
                if ($LASTEXITCODE -ne 0) { throw "Configure failed for $key" }

                cmake --build $bld --config $t.Config --parallel
                if ($LASTEXITCODE -ne 0) { throw "Build failed for $key" }

                cmake --install $bld --config $t.Config
                if ($LASTEXITCODE -ne 0) { throw "Install failed for $key" }
              }
            }
          }

      - name: Assemble distribution (headers + libs + dll per runtime + props)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:GITHUB_WORKSPACE
          $dist = Join-Path $root 'dist/libcurl-v143'
          New-Item -ItemType Directory -Force -Path (Join-Path $dist 'include/curl') | Out-Null

          $archs = @("Win32", "x64")
          $kinds = @("static", "dll")
          $runtimes = @("mt", "mtd", "md", "mdd")

          foreach ($a in $archs) {
            foreach ($k in $kinds) {
              New-Item -ItemType Directory -Force -Path (Join-Path $dist ("lib/{0}/{1}" -f $a, $k)) | Out-Null
            }
          }

          $hdr = Join-Path $root 'curl/include/curl'
          if (-not (Test-Path $hdr)) { throw "Missing curl headers: $hdr" }
          Copy-Item (Join-Path $hdr '*.h') -Destination (Join-Path $dist 'include/curl') -Force

          function Copy-DllLayout {
            param([string]$Arch, [string]$Runtime)
            $aKey = $Arch.ToLowerInvariant()
            $stg = Join-Path $root ("stage/{0}-dll-{1}" -f $aKey, $Runtime)
            $out = Join-Path $dist ("lib/{0}/dll" -f $Arch)
            $bin = Join-Path $stg 'bin'
            $lib = Join-Path $stg 'lib'
            if (-not (Test-Path $bin)) { throw "Missing install bin directory: $bin" }
            if (-not (Test-Path $lib)) { throw "Missing install lib directory: $lib" }

            $dll = Get-ChildItem -Path $bin -Filter 'libcurl*.dll' -File -ErrorAction SilentlyContinue | Select-Object -First 1
            $exe = Get-ChildItem -Path $bin -Filter 'curl*.exe' -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not (Test-Path $dll)) { throw "Missing $dll" }
            if (-not (Test-Path $exe)) { throw "Missing $exe" }
            Copy-Item $dll.FullName (Join-Path $out ("{0}_{1}{2}" -f $dll.BaseName, $Runtime, $dll.Extension)) -Force
            Copy-Item $exe.FullName (Join-Path $out ("{0}_{1}{2}" -f $exe.BaseName, $Runtime, $exe.Extension)) -Force

            $imp = Get-ChildItem -Path $lib -Filter '*_imp.lib' -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $imp) { throw "Missing import lib under $lib" }
            Copy-Item $imp.FullName (Join-Path $out ("libcurl_{0}.lib" -f $Runtime)) -Force

            foreach ($extra in @('*.pdb', '*.exp')) {
              Get-ChildItem -Path $lib -Filter $extra -ErrorAction SilentlyContinue | ForEach-Object {
                $dst = "{0}_{1}{2}" -f $_.BaseName, $Runtime, $_.Extension
                Copy-Item $_.FullName (Join-Path $out $dst) -Force
              }
              Get-ChildItem -Path $bin -Filter $extra -ErrorAction SilentlyContinue | ForEach-Object {
                $dst = "{0}_{1}{2}" -f $_.BaseName, $Runtime, $_.Extension
                Copy-Item $_.FullName (Join-Path $out $dst) -Force
              }
            }
          }

          function Copy-StaticLayout {
            param([string]$Arch, [string]$Runtime)
            $aKey = $Arch.ToLowerInvariant()
            $stg = Join-Path $root ("stage/{0}-static-{1}" -f $aKey, $Runtime)
            $out = Join-Path $dist ("lib/{0}/static" -f $Arch)
            $lib = Join-Path $stg 'lib'
            $bin = Join-Path $stg 'bin'
            if (-not (Test-Path $lib)) { throw "Missing install lib directory: $lib" }

            $st = Get-ChildItem -Path $lib -Filter 'libcurl*.lib' -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -notlike '*_imp.lib' } | Select-Object -First 1
            if (-not $st) { throw "Missing static lib under $lib" }
            Copy-Item $st.FullName (Join-Path $out ("libcurl_{0}.lib" -f $Runtime)) -Force
            $exe = Get-ChildItem -Path $bin -Filter 'curl*.exe' -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) {
              Copy-Item $exe.FullName (Join-Path $out ("{0}_{1}{2}" -f $exe.BaseName, $Runtime, $exe.Extension)) -Force
            }
            Get-ChildItem -Path $lib -Filter '*.pdb' -ErrorAction SilentlyContinue | ForEach-Object {
              $dst = "{0}_{1}{2}" -f $_.BaseName, $Runtime, $_.Extension
              Copy-Item $_.FullName (Join-Path $out $dst) -Force
            }
          }

          foreach ($a in $archs) {
            foreach ($rt in $runtimes) {
              Copy-DllLayout $a $rt
              Copy-StaticLayout $a $rt
            }
          }

          $propsDst = Join-Path $dist 'libcurl.v143.props'
          @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003">',
            '  <PropertyGroup>',
            '    <LibcurlRoot Condition="''$(LibcurlRoot)''==''''">$(MSBuildThisFileDirectory)</LibcurlRoot>',
            '    <LibcurlUseDll Condition="''$(LibcurlUseDll)''==''''">true</LibcurlUseDll>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(Platform)''==''Win32''">',
            '    <LibcurlPlatformDir>Win32</LibcurlPlatformDir>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(Platform)''==''x64''">',
            '    <LibcurlPlatformDir>x64</LibcurlPlatformDir>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(LibcurlRuntime)''==''mt'' or ''$(RuntimeLibrary)''==''MultiThreaded''">',
            '    <LibcurlRuntimeDir>mt</LibcurlRuntimeDir>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(LibcurlRuntime)''==''mtd'' or ''$(RuntimeLibrary)''==''MultiThreadedDebug''">',
            '    <LibcurlRuntimeDir>mtd</LibcurlRuntimeDir>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(LibcurlRuntime)''==''md'' or ''$(RuntimeLibrary)''==''MultiThreadedDLL''">',
            '    <LibcurlRuntimeDir>md</LibcurlRuntimeDir>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(LibcurlRuntime)''==''mdd'' or ''$(RuntimeLibrary)''==''MultiThreadedDebugDLL''">',
            '    <LibcurlRuntimeDir>mdd</LibcurlRuntimeDir>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(LibcurlRuntimeDir)''==''''">',
            '    <LibcurlRuntimeDir>md</LibcurlRuntimeDir>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(LibcurlUseDll)''==''true''">',
            '    <LibcurlLibDir>$(LibcurlRoot)lib\$(LibcurlPlatformDir)\dll</LibcurlLibDir>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(LibcurlUseDll)''!=''true''">',
            '    <LibcurlLibDir>$(LibcurlRoot)lib\$(LibcurlPlatformDir)\static</LibcurlLibDir>',
            '  </PropertyGroup>',
            '  <ItemDefinitionGroup>',
            '    <ClCompile>',
            '      <AdditionalIncludeDirectories>$(LibcurlRoot)include;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>',
            '    </ClCompile>',
            '  </ItemDefinitionGroup>',
            '  <ItemDefinitionGroup Condition="''$(LibcurlUseDll)''==''true''">',
            '    <Link>',
            '      <AdditionalLibraryDirectories>$(LibcurlLibDir);%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>',
            '      <AdditionalDependencies>libcurl_$(LibcurlRuntimeDir).lib;ws2_32.lib;wldap32.lib;advapi32.lib;crypt32.lib;bcrypt.lib;Normaliz.lib;%(AdditionalDependencies)</AdditionalDependencies>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '  <ItemDefinitionGroup Condition="''$(LibcurlUseDll)''!=''true''">',
            '    <ClCompile>',
            '      <PreprocessorDefinitions>%(PreprocessorDefinitions);CURL_STATICLIB</PreprocessorDefinitions>',
            '    </ClCompile>',
            '    <Link>',
            '      <AdditionalLibraryDirectories>$(LibcurlLibDir);%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>',
            '      <AdditionalDependencies>libcurl_$(LibcurlRuntimeDir).lib;ws2_32.lib;wldap32.lib;advapi32.lib;crypt32.lib;bcrypt.lib;Normaliz.lib;%(AdditionalDependencies)</AdditionalDependencies>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          ) | Set-Content -LiteralPath $propsDst -Encoding utf8

          $ref = $env:CURL_REF
          $repo = $env:CURL_REPO
          $readme = @"
          libcurl prebuilt (MSVC v143, Schannel TLS)

          Matrix
          - Platform: Win32 + x64
          - Linkage: static + dll
          - Runtime: mt / mtd / md / mdd

          Layout
          - include/curl
          - lib/{Win32|x64}/{static|dll}
            (filenames include runtime suffix: *_mt, *_mtd, *_md, *_mdd)
          - libcurl.v143.props

          Using the props
          - Import libcurl.v143.props in your vcxproj.
          - LibcurlUseDll=true (default) links DLL import library.
          - LibcurlUseDll=false defines CURL_STATICLIB and links static library.
          - Runtime is auto-detected from RuntimeLibrary (MT/MTd/MD/MDd).
          - Optional override: set LibcurlRuntime to mt/mtd/md/mdd.

          Schannel is used for HTTPS; no OpenSSL runtime required.

          Upstream: $repo ref $ref
          "@
          $readme.Trim() | Set-Content -LiteralPath (Join-Path $dist 'README.txt') -Encoding utf8

      - name: Generate GitHub Release metadata
        id: tag
        if: (!cancelled())
        shell: pwsh
        env:
          UPLOAD_RELEASE: ${{ env.UPLOAD_RELEASE }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:UPLOAD_RELEASE -ne 'true') {
            "status=skip" >> $env:GITHUB_OUTPUT
            Write-Host "UPLOAD_RELEASE is not true; skip GitHub Release."
            exit 0
          }
          $ws = $env:GITHUB_WORKSPACE
          $fileDate = Get-Date -Format 'yyyy.MM.dd-HHmm'
          $releaseTag = "libcurl-v143-$fileDate-$($env:CURL_REF)"
          $releaseName = $releaseTag
          $zipBase = "$releaseTag.zip"
          $body = Join-Path $ws 'release-libcurl.txt'
          @(
            "libcurl Windows v143 prebuilt",
            "",
            "- curl: $($env:CURL_REPO) (ref $($env:CURL_REF))",
            "- TLS: Schannel (Windows native)",
            "- Platform: Win32 + x64, MSVC toolset v143",
            "- Runtime matrix: mt/mtd/md/mdd",
            "- Linkage matrix: static + dll",
            "",
            "Asset: $zipBase (dist layout + README + props)"
          ) | Set-Content -LiteralPath $body -Encoding utf8
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "status=success" >> $env:GITHUB_OUTPUT
          Write-Host "Release tag=$releaseTag"

      - name: Zip distribution for GitHub Release
        if: steps.tag.outputs.status == 'success' && !cancelled()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $src = Join-Path $env:GITHUB_WORKSPACE 'dist/libcurl-v143'
          $tag = '${{ steps.tag.outputs.release_tag }}'
          if (-not $tag) { throw "release_tag empty" }
          $zip = Join-Path $env:GITHUB_WORKSPACE "$tag.zip"
          if (Test-Path $zip) { Remove-Item -LiteralPath $zip -Force }
          Compress-Archive -Path (Join-Path $src '*') -DestinationPath $zip -CompressionLevel Optimal

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2.1.0
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: ${{ steps.tag.outputs.release_name }}
          body_path: ${{ github.workspace }}/release-libcurl.txt
          files: ${{ github.workspace }}/${{ steps.tag.outputs.release_tag }}.zip

      - name: Upload distribution artifact
        if: env.UPLOAD_ARTIFACT == 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: libcurl-v143-win32-x64-runtime-matrix
          path: |
            dist/libcurl-v143/**
