# Build mp3lame via vcpkg for Win32 and x64 with MSVC toolset v143.
# Triplets matrix:
# - x86/x64
# - static/dll
# - mt/md

name: mp3lame vcpkg Windows v143

on:
  repository_dispatch:
  workflow_dispatch:

env:
  # Pin vcpkg for reproducible builds (https://github.com/microsoft/vcpkg/releases)
  VCPKG_REF: 2025.01.13
  UPLOAD_ARTIFACT: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 10

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Install Visual Studio 2022 Build Tools (C++, MSVC v143)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $bootstrapper = Join-Path $env:TEMP "vs_BuildTools.exe"
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_BuildTools.exe" -OutFile $bootstrapper -UseBasicParsing
          Write-Host "Installing VS 2022 Build Tools (default path; first run can take 15-25 minutes)"
          $args = @(
            "--quiet", "--wait", "--norestart", "--nocache",
            "--add", "Microsoft.VisualStudio.Workload.VCTools",
            "--add", "Microsoft.VisualStudio.Component.VC.Tools.x86.x64",
            "--add", "Microsoft.VisualStudio.Component.VC.v143.x86.x64"
          )
          $p = Start-Process -FilePath $bootstrapper -ArgumentList $args -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -notin 0, 3010) {
            throw "vs_BuildTools.exe exited with $($p.ExitCode)"
          }
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $root = & $vswhere -latest -products Microsoft.VisualStudio.Product.BuildTools `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $root) {
            throw "vswhere: no VS 2022 Build Tools with VC.Tools.x86.x64 (install may have failed or skipped C++)."
          }
          $vcvars32 = Join-Path $root "VC\Auxiliary\Build\vcvars32.bat"
          if (-not (Test-Path $vcvars32)) {
            throw "Missing VC toolchain: $vcvars32"
          }
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "VS_INST=$root"
          Write-Host "Build will use VS_INST=$root"

      - name: Clone vcpkg
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:GITHUB_WORKSPACE
          $vp = Join-Path $root "vcpkg"
          if (Test-Path $vp) { Remove-Item -LiteralPath $vp -Recurse -Force }
          git clone --depth 1 --branch $env:VCPKG_REF https://github.com/microsoft/vcpkg.git $vp
          if ($LASTEXITCODE -ne 0) {
            throw "git clone vcpkg failed (VCPKG_REF=$($env:VCPKG_REF) must be a branch or tag reachable with --depth 1)"
          }

      - name: Bootstrap vcpkg
        shell: cmd
        run: |
          cd /d "%GITHUB_WORKSPACE%\vcpkg"
          call bootstrap-vcpkg.bat -disableMetrics

      - name: Overlay triplets (v143)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $od = Join-Path $env:GITHUB_WORKSPACE "vcpkg-overlay-triplets"
          New-Item -ItemType Directory -Force -Path $od | Out-Null

          @(
            'set(VCPKG_TARGET_ARCHITECTURE x86)',
            'set(VCPKG_CRT_LINKAGE static)',
            'set(VCPKG_LIBRARY_LINKAGE static)',
            'set(VCPKG_PLATFORM_TOOLSET v143)'
          ) | Set-Content -LiteralPath (Join-Path $od "x86-windows-static-mt.cmake") -Encoding ascii
          @(
            'set(VCPKG_TARGET_ARCHITECTURE x86)',
            'set(VCPKG_CRT_LINKAGE dynamic)',
            'set(VCPKG_LIBRARY_LINKAGE static)',
            'set(VCPKG_PLATFORM_TOOLSET v143)'
          ) | Set-Content -LiteralPath (Join-Path $od "x86-windows-static-md.cmake") -Encoding ascii
          @(
            'set(VCPKG_TARGET_ARCHITECTURE x86)',
            'set(VCPKG_CRT_LINKAGE static)',
            'set(VCPKG_LIBRARY_LINKAGE dynamic)',
            'set(VCPKG_PLATFORM_TOOLSET v143)'
          ) | Set-Content -LiteralPath (Join-Path $od "x86-windows-dll-mt.cmake") -Encoding ascii
          @(
            'set(VCPKG_TARGET_ARCHITECTURE x86)',
            'set(VCPKG_CRT_LINKAGE dynamic)',
            'set(VCPKG_LIBRARY_LINKAGE dynamic)',
            'set(VCPKG_PLATFORM_TOOLSET v143)'
          ) | Set-Content -LiteralPath (Join-Path $od "x86-windows-dll-md.cmake") -Encoding ascii

          @(
            'set(VCPKG_TARGET_ARCHITECTURE x64)',
            'set(VCPKG_CRT_LINKAGE static)',
            'set(VCPKG_LIBRARY_LINKAGE static)',
            'set(VCPKG_PLATFORM_TOOLSET v143)'
          ) | Set-Content -LiteralPath (Join-Path $od "x64-windows-static-mt.cmake") -Encoding ascii
          @(
            'set(VCPKG_TARGET_ARCHITECTURE x64)',
            'set(VCPKG_CRT_LINKAGE dynamic)',
            'set(VCPKG_LIBRARY_LINKAGE static)',
            'set(VCPKG_PLATFORM_TOOLSET v143)'
          ) | Set-Content -LiteralPath (Join-Path $od "x64-windows-static-md.cmake") -Encoding ascii
          @(
            'set(VCPKG_TARGET_ARCHITECTURE x64)',
            'set(VCPKG_CRT_LINKAGE static)',
            'set(VCPKG_LIBRARY_LINKAGE dynamic)',
            'set(VCPKG_PLATFORM_TOOLSET v143)'
          ) | Set-Content -LiteralPath (Join-Path $od "x64-windows-dll-mt.cmake") -Encoding ascii
          @(
            'set(VCPKG_TARGET_ARCHITECTURE x64)',
            'set(VCPKG_CRT_LINKAGE dynamic)',
            'set(VCPKG_LIBRARY_LINKAGE dynamic)',
            'set(VCPKG_PLATFORM_TOOLSET v143)'
          ) | Set-Content -LiteralPath (Join-Path $od "x64-windows-dll-md.cmake") -Encoding ascii

          Add-Content -LiteralPath $env:GITHUB_ENV -Value "VCPKG_OVERLAY_TRIPLETS=$od"

      # Do not set VCPKG_VISUAL_STUDIO_PATH to BuildTools: vcpkg host deps use triplet.
      # Let vcpkg pick valid VS on the runner (e.g. Enterprise preinstalled).
      - name: vcpkg install mp3lame (Win32 + x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:GITHUB_WORKSPACE
          $vp = Join-Path $root "vcpkg\vcpkg.exe"
          $overlay = $env:VCPKG_OVERLAY_TRIPLETS
          & $vp install `
            'mp3lame:x86-windows-static-mt' `
            'mp3lame:x86-windows-static-md' `
            'mp3lame:x86-windows-dll-mt' `
            'mp3lame:x86-windows-dll-md' `
            'mp3lame:x64-windows-static-mt' `
            'mp3lame:x64-windows-static-md' `
            'mp3lame:x64-windows-dll-mt' `
            'mp3lame:x64-windows-dll-md' `
            --overlay-triplets=$overlay `
            --clean-after-build
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed" }

      - name: Assemble distribution (per-triplet tree + props)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:GITHUB_WORKSPACE
          $vpRoot = Join-Path $root "vcpkg"
          $installed = Join-Path $vpRoot "installed"
          $dist = Join-Path $root "dist/mp3lame-vcpkg-v143"

          foreach ($t in @(
            "x86-windows-static-mt",
            "x86-windows-static-md",
            "x86-windows-dll-mt",
            "x86-windows-dll-md",
            "x64-windows-static-mt",
            "x64-windows-static-md",
            "x64-windows-dll-mt",
            "x64-windows-dll-md"
          )) {
            $src = Join-Path $installed $t
            if (-not (Test-Path $src)) { throw "Missing vcpkg installed tree: $src" }
            $dst = Join-Path $dist $t
            foreach ($sub in @("include", "lib", "bin", "share", "debug")) {
              $sp = Join-Path $src $sub
              if (Test-Path $sp) {
                Copy-Item -LiteralPath $sp -Destination $dst -Recurse -Force
              }
            }
          }

          $propsDst = Join-Path $dist "mp3lame.vcpkg.v143.props"
          @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003">',
            '  <PropertyGroup>',
            '    <Mp3LameRoot Condition="''$(Mp3LameRoot)''==''''">$(MSBuildThisFileDirectory)</Mp3LameRoot>',
            '    <Mp3LameUseDll Condition="''$(Mp3LameUseDll)''==''''">true</Mp3LameUseDll>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(Platform)''==''Win32''">',
            '    <Mp3LameVcpkgArch>x86</Mp3LameVcpkgArch>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(Platform)''==''x64''">',
            '    <Mp3LameVcpkgArch>x64</Mp3LameVcpkgArch>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(RuntimeLibrary)''==''MultiThreaded'' or ''$(RuntimeLibrary)''==''MultiThreadedDebug''">',
            '    <Mp3LameVcpkgCrt>mt</Mp3LameVcpkgCrt>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(RuntimeLibrary)''==''MultiThreadedDLL'' or ''$(RuntimeLibrary)''==''MultiThreadedDebugDLL''">',
            '    <Mp3LameVcpkgCrt>md</Mp3LameVcpkgCrt>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(Mp3LameUseDll)''==''true''">',
            '    <Mp3LameVcpkgLinkage>dll</Mp3LameVcpkgLinkage>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(Mp3LameUseDll)''!=''true''">',
            '    <Mp3LameVcpkgLinkage>static</Mp3LameVcpkgLinkage>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(Configuration)''==''Debug''">',
            '    <Mp3LameVcpkgLibSubdir>debug\lib</Mp3LameVcpkgLibSubdir>',
            '  </PropertyGroup>',
            '  <PropertyGroup Condition="''$(Mp3LameVcpkgLibSubdir)''==''''">',
            '    <Mp3LameVcpkgLibSubdir>lib</Mp3LameVcpkgLibSubdir>',
            '  </PropertyGroup>',
            '  <PropertyGroup>',
            '    <Mp3LameVcpkgTriplet>$(Mp3LameVcpkgArch)-windows-$(Mp3LameVcpkgLinkage)-$(Mp3LameVcpkgCrt)</Mp3LameVcpkgTriplet>',
            '  </PropertyGroup>',
            '  <ItemDefinitionGroup>',
            '    <ClCompile>',
            '      <AdditionalIncludeDirectories>$(Mp3LameRoot)$(Mp3LameVcpkgTriplet)\include;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>',
            '    </ClCompile>',
            '    <Link>',
            '      <AdditionalLibraryDirectories>$(Mp3LameRoot)$(Mp3LameVcpkgTriplet)\$(Mp3LameVcpkgLibSubdir);%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '  <ItemDefinitionGroup Condition="''$(Mp3LameUseDll)''==''true''">',
            '    <Link>',
            '      <AdditionalDependencies>libmp3lame.lib;%(AdditionalDependencies)</AdditionalDependencies>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '  <ItemDefinitionGroup Condition="''$(Mp3LameUseDll)''!=''true''">',
            '    <Link>',
            '      <AdditionalDependencies>libmp3lame-static.lib;%(AdditionalDependencies)</AdditionalDependencies>',
            '    </Link>',
            '  </ItemDefinitionGroup>',
            '</Project>'
          ) | Set-Content -LiteralPath $propsDst -Encoding utf8

          $ref = $env:VCPKG_REF
          $readme = @"
          mp3lame built with vcpkg (MSVC toolset v143)

          Layout (per vcpkg triplet)
          - x86-windows-{static|dll}-mt/  Win32
          - x86-windows-{static|dll}-md/  Win32
          - x64-windows-{static|dll}-mt/  x64
          - x64-windows-{static|dll}-md/  x64
          - mp3lame.vcpkg.v143.props

          Notes
          - vcpkg port: mp3lame (library name is libmp3lame(.lib) / libmp3lame-static(.lib) on Windows)
          - Debug libraries live under debug\lib and are included in this package.

          vcpkg ref: $ref (set env VCPKG_REF in workflow to pin tag or commit)
          "@
          $readme.Trim() | Set-Content -LiteralPath (Join-Path $dist "README.txt") -Encoding utf8

      - name: Generate GitHub Release metadata
        id: tag
        if: success() && !cancelled()
        shell: pwsh
        env:
          UPLOAD_RELEASE: ${{ env.UPLOAD_RELEASE }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:UPLOAD_RELEASE -ne 'true') {
            "status=skip" >> $env:GITHUB_OUTPUT
            Write-Host "UPLOAD_RELEASE is not true; skip GitHub Release."
            exit 0
          }
          $ws = $env:GITHUB_WORKSPACE
          $fileDate = Get-Date -Format 'yyyy.MM.dd-HHmm'
          $releaseTag = "mp3lame-vcpkg-v143-$fileDate-vcpkg$($env:VCPKG_REF -replace '[^a-zA-Z0-9._-]', '_')"
          $releaseName = $releaseTag
          $zipBase = "$releaseTag.zip"
          $body = Join-Path $ws 'release-mp3lame-vcpkg.txt'
          @(
            "mp3lame vcpkg Windows v143 prebuilt",
            "",
            "- Built with vcpkg (microsoft/vcpkg ref $($env:VCPKG_REF))",
            "- Triplets: x86/x64 × static/dll × mt/md (VCPKG_PLATFORM_TOOLSET=v143)",
            "- vcpkg port: mp3lame",
            "",
            "Asset: $zipBase"
          ) | Set-Content -LiteralPath $body -Encoding utf8
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "status=success" >> $env:GITHUB_OUTPUT
          Write-Host "Release tag=$releaseTag"

      - name: Cleanup old GitHub Releases and tags
        if: success() && env.UPLOAD_RELEASE == 'true' && !cancelled()
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: ${{ env.KEEP_RELEASES }}
        run: |
          $ErrorActionPreference = 'Stop'
          $repo = "${{ github.repository }}"
          $api = "https://api.github.com/repos/$repo"
          $prefix = "mp3lame-vcpkg-v143-"
          $keep = [int]$env:KEEP_RELEASES
          if ($keep -lt 1) { $keep = 1 }
          $headers = @{
            Authorization = "Bearer $($env:GITHUB_TOKEN)"
            "User-Agent"  = "actions-cleanup-script"
            Accept        = "application/vnd.github+json"
          }

          $releases = Invoke-RestMethod -Method Get -Headers $headers -Uri "$api/releases?per_page=100"
          $matched = @($releases | Where-Object { $_.tag_name -like "$prefix*" } | Sort-Object created_at -Descending)
          $toDelete = @($matched | Select-Object -Skip $keep)

          foreach ($rel in $toDelete) {
            $tag = $rel.tag_name
            Write-Host "Deleting release id=$($rel.id), tag=$tag"
            Invoke-RestMethod -Method Delete -Headers $headers -Uri "$api/releases/$($rel.id)"
            $tagRef = [uri]::EscapeDataString($tag)
            Invoke-RestMethod -Method Delete -Headers $headers -Uri "$api/git/refs/tags/$tagRef"
          }
          Write-Host "Cleanup done. matched=$($matched.Count), kept=$keep, deleted=$($toDelete.Count)"

      - name: Zip distribution for GitHub Release
        if: success() && steps.tag.outputs.status == 'success' && !cancelled()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $src = Join-Path $env:GITHUB_WORKSPACE 'dist/mp3lame-vcpkg-v143'
          $tag = '${{ steps.tag.outputs.release_tag }}'
          if (-not $tag) { throw "release_tag empty" }
          $zip = Join-Path $env:GITHUB_WORKSPACE "$tag.zip"
          if (Test-Path $zip) { Remove-Item -LiteralPath $zip -Force }
          Compress-Archive -Path (Join-Path $src '*') -DestinationPath $zip -CompressionLevel Optimal

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2.1.0
        if: success() && steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: ${{ steps.tag.outputs.release_name }}
          body_path: ${{ github.workspace }}/release-mp3lame-vcpkg.txt
          files: ${{ github.workspace }}/${{ steps.tag.outputs.release_tag }}.zip

      - name: Upload distribution artifact
        if: success() && env.UPLOAD_ARTIFACT == 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: mp3lame-vcpkg-v143-dist
          path: |
            dist/mp3lame-vcpkg-v143/**

