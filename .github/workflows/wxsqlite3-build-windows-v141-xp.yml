# Build wxSQLite3 for Win32 and x64 with MSVC platform toolset v141_xp. wxWidgets is taken from
# official release prebuilts (vc14x Win32+x64 Dev + headers), not built from source. Runner:
# windows-latest; VS 2022 Build Tools via bootstrapper with v141 + WinXP optional components.

name: wxSQLite3 Windows v141_xp

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  WXSQLITE3_REPO: utelle/wxsqlite3
  # upstream default is main (not master); use a tag e.g. v4.12.2 for reproducible builds
  WXSQLITE3_REF: main
  # Prebuilt archives from https://github.com/wxWidgets/wxWidgets/releases/tag/v3.2.10
  WXWIDGETS_VER: "3.2.10"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout wxSQLite3
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WXSQLITE3_REPO }}
          ref: ${{ env.WXSQLITE3_REF }}
          path: wxsqlite3

      - name: Install Visual Studio 2022 Build Tools (C++, MSVC v141, WinXP toolset pack)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $bootstrapper = Join-Path $env:TEMP "vs_BuildTools.exe"
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_BuildTools.exe" -OutFile $bootstrapper -UseBasicParsing
          # Use default install layout under Program Files (x86); custom paths often miss VC\Auxiliary\Build on runners.
          Write-Host "Installing VS 2022 Build Tools (default path; first run can take 15-25 minutes)"
          $args = @(
            "--quiet", "--wait", "--norestart", "--nocache",
            "--add", "Microsoft.VisualStudio.Workload.VCTools",
            "--add", "Microsoft.VisualStudio.Component.VC.Tools.x86.x64",
            "--add", "Microsoft.VisualStudio.Component.VC.v141.x86.x64",
            "--add", "Microsoft.VisualStudio.Component.WinXP"
          )
          $p = Start-Process -FilePath $bootstrapper -ArgumentList $args -Wait -PassThru -NoNewWindow
          if ($p.ExitCode -notin 0, 3010) {
            throw "vs_BuildTools.exe exited with $($p.ExitCode)"
          }
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $root = & $vswhere -latest -products Microsoft.VisualStudio.Product.BuildTools `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $root) {
            throw "vswhere: no VS 2022 Build Tools with VC.Tools.x86.x64 (install may have failed or skipped C++)."
          }
          $vcvars32 = Join-Path $root "VC\Auxiliary\Build\vcvars32.bat"
          if (-not (Test-Path $vcvars32)) {
            Get-ChildItem -LiteralPath $root -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
            throw "Missing VC toolchain: $vcvars32"
          }
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "VS_INST=$root"
          Write-Host "Build will use VS_INST=$root"

      - name: Download and extract wxWidgets prebuilt (headers + vc14x Win32 + x64 Dev)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $ver = $env:WXWIDGETS_VER
          $base = "https://github.com/wxWidgets/wxWidgets/releases/download/v$ver"
          $names = @(
            "wxWidgets-$ver-headers.7z",
            "wxMSW-${ver}_vc14x_Dev.7z",
            "wxMSW-${ver}_vc14x_x64_Dev.7z"
          )
          $dl = Join-Path $env:TEMP "wx-prebuilt"
          New-Item -ItemType Directory -Force -Path $dl | Out-Null
          foreach ($name in $names) {
            $url = "$base/$name"
            $out = Join-Path $dl $name
            Write-Host "Downloading $url"
            Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          }
          $7z = Join-Path $env:ProgramFiles "7-Zip\7z.exe"
          if (-not (Test-Path $7z)) {
            Write-Host "Installing 7-Zip..."
            choco install 7zip -y --no-progress
            $7z = Join-Path $env:ProgramFiles "7-Zip\7z.exe"
            if (-not (Test-Path $7z)) { throw "7-Zip not found after install: $7z" }
          }
          # Archives expand to top-level include\ and lib\ (no wxWidgets-x.y.z wrapper).
          $wxroot = Join-Path $env:GITHUB_WORKSPACE "wxWidgets-$ver"
          New-Item -ItemType Directory -Force -Path $wxroot | Out-Null
          foreach ($name in $names) {
            Write-Host "Extracting $name"
            & $7z x (Join-Path $dl $name) "-o$wxroot" -y | Out-Null
            if ($LASTEXITCODE -ne 0) { throw "7z failed for $name (exit $LASTEXITCODE)" }
          }
          $inc = Join-Path $wxroot "include"
          $lib = Join-Path $wxroot "lib"
          if (-not (Test-Path $inc)) { throw "wxWidgets missing include\: $wxroot" }
          if (-not (Test-Path $lib)) { throw "wxWidgets missing lib\: $wxroot" }
          # Official Dev trees are lib\vc14x_dll and lib\vc14x_x64_dll; wxsqlite3 vcxproj hard-codes *_lib.
          $dll32 = Join-Path $lib "vc14x_dll"
          $dll64 = Join-Path $lib "vc14x_x64_dll"
          $lnk32 = Join-Path $lib "vc14x_lib"
          $lnk64 = Join-Path $lib "vc14x_x64_lib"
          if (-not (Test-Path $dll32)) { throw "Expected prebuilt folder missing: $dll32" }
          if (-not (Test-Path $dll64)) { throw "Expected prebuilt folder missing: $dll64" }
          New-Item -ItemType Junction -Path $lnk32 -Target $dll32 -Force | Out-Null
          New-Item -ItemType Junction -Path $lnk64 -Target $dll64 -Force | Out-Null
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "WXWIN=$wxroot"
          Write-Host "WXWIN=$wxroot"

      # Do not add wx_local.props here: an empty wxMsvcVersionAuto overrides wx_setup.props and
      # drops wxMSVC_VERSION_AUTO / wxMSVC_VERSION_ABI_COMPAT, so include/msvc/wx/setup.h falls
      # back to vc + _lib (vc_lib) instead of vc14x_lib. Default wx_setup.props is correct for vc14x prebuilts.

      # Upstream wx_setup.props matches "Debug DLL" / "Release DLL" (space); solution uses Debug_DLL / Release_DLL.
      - name: Patch wx_setup.props for Release_DLL / Debug_DLL out dirs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $p = Join-Path $env:GITHUB_WORKSPACE 'wxsqlite3/build/wx_setup.props'
          $old = '$(Configuration.StartsWith(''Debug DLL'')) or $(Configuration.StartsWith(''Release DLL''))'
          $new = '$(Configuration.Contains(''_DLL'')) and !$(Configuration.Contains(''wxDLL''))'
          $text = Get-Content -LiteralPath $p -Raw -Encoding utf8
          if (-not $text.Contains($old)) { throw "wx_setup.props: expected condition substring not found" }
          $text = $text.Replace($old, $new)
          Set-Content -LiteralPath $p -Value $text -Encoding utf8 -NoNewline

      - name: Build wxSQLite3 (static + DLL, Win32 + x64, toolset v141_xp)
        shell: cmd
        run: |
          if not defined VS_INST ( echo VS_INST not set: install step must export it via GITHUB_ENV & exit /b 1 )
          if not defined WXWIN ( echo WXWIN not set: prebuilt wxWidgets extract step must export it & exit /b 1 )
          if not exist "%VS_INST%\VC\Auxiliary\Build\vcvars32.bat" ( echo VS tools not found under "%VS_INST%" & exit /b 1 )
          if not exist "%WXWIN%\include" ( echo WXWIN invalid: "%WXWIN%" & exit /b 1 )

          call "%VS_INST%\VC\Auxiliary\Build\vcvars32.bat"
          msbuild wxsqlite3\build\wxsqlite3_vc15.sln /m /verbosity:minimal /t:wxsqlite3 /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v141_xp
          if errorlevel 1 exit /b 1
          msbuild wxsqlite3\build\wxsqlite3_vc15.sln /m /verbosity:minimal /t:wxsqlite3 /p:Configuration=Release_DLL /p:Platform=Win32 /p:PlatformToolset=v141_xp
          if errorlevel 1 exit /b 1

          call "%VS_INST%\VC\Auxiliary\Build\vcvars64.bat"
          msbuild wxsqlite3\build\wxsqlite3_vc15.sln /m /verbosity:minimal /t:wxsqlite3 /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v141_xp
          if errorlevel 1 exit /b 1
          msbuild wxsqlite3\build\wxsqlite3_vc15.sln /m /verbosity:minimal /t:wxsqlite3 /p:Configuration=Release_DLL /p:Platform=x64 /p:PlatformToolset=v141_xp
          if errorlevel 1 exit /b 1

      - name: Assemble distribution (headers + libs + DLL + consumer props)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:GITHUB_WORKSPACE
          $dist = Join-Path $root 'dist/wxsqlite3-v141_xp'
          New-Item -ItemType Directory -Force -Path (Join-Path $dist 'include/wx') | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $dist 'lib/Win32/static/Release') | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $dist 'lib/Win32/dll/Release') | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $dist 'lib/x64/static/Release') | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $dist 'lib/x64/dll/Release') | Out-Null

          Copy-Item (Join-Path $root 'wxsqlite3/include/wx/*.h') -Destination (Join-Path $dist 'include/wx') -Force

          $s32 = Join-Path $root 'wxsqlite3/lib/vc14x_lib/wxsqlite3.lib'
          $s64 = Join-Path $root 'wxsqlite3/lib/vc14x_x64_lib/wxsqlite3.lib'
          if (-not (Test-Path $s32)) { throw "Missing static Win32 lib: $s32" }
          if (-not (Test-Path $s64)) { throw "Missing static x64 lib: $s64" }
          Copy-Item $s32 (Join-Path $dist 'lib/Win32/static/Release/wxsqlite3.lib') -Force
          Copy-Item $s64 (Join-Path $dist 'lib/x64/static/Release/wxsqlite3.lib') -Force

          $d32 = Join-Path $root 'wxsqlite3/lib/vc14x_dll'
          $d64 = Join-Path $root 'wxsqlite3/lib/vc14x_x64_dll'
          foreach ($pair in @(
            @{ Dir = $d32; Out = 'lib/Win32/dll/Release' },
            @{ Dir = $d64; Out = 'lib/x64/dll/Release' }
          )) {
            $dir = $pair.Dir
            $out = Join-Path $dist $pair.Out
            foreach ($pat in @('wxsqlite3.dll', 'wxsqlite3.lib', 'wxsqlite3.pdb', 'wxsqlite3.exp')) {
              $f = Join-Path $dir $pat
              if (Test-Path $f) { Copy-Item $f $out -Force }
            }
            if (-not (Test-Path (Join-Path $out 'wxsqlite3.dll'))) { throw "Missing DLL under $dir" }
            if (-not (Test-Path (Join-Path $out 'wxsqlite3.lib'))) { throw "Missing import lib under $dir" }
          }

          $propsSrc = Join-Path $root 'packaging/wxsqlite3.v141_xp.props'
          if (-not (Test-Path $propsSrc)) { throw "Missing packaging/wxsqlite3.v141_xp.props in build repo" }
          Copy-Item $propsSrc (Join-Path $dist 'wxsqlite3.v141_xp.props') -Force

          $wxv = $env:WXWIDGETS_VER
          $repo = $env:WXSQLITE3_REPO
          $ref = $env:WXSQLITE3_REF
          $readme = @"
          wxSQLite3 预编译（MSVC v141_xp，Unicode，与 wxWidgets $wxv vc14x DLL 配套）

          目录说明
          - include/wx          公共头文件
          - lib/Win32|x64/static/Release   静态库 wxsqlite3.lib
          - lib/Win32|x64/dll/Release      wxsqlite3.dll、导入库 wxsqlite3.lib（及 pdb/exp 若有）
          - wxsqlite3.v141_xp.props      供其它工程 Import 的属性表

          使用 props（动态链接 wx + wxSQLite3）
          1. 安装与构建时相同的 wxWidgets（本 CI 使用官方 wxMSW-*_vc14x*_Dev.7z + headers）。
          2. 设置 WXWIN 为 wxWidgets 根目录（用户宏或环境变量均可）。
          3. 在 vcxproj 合适位置加入一行 Import（路径按实际放置调整）：
               <Import Project="...\\wxsqlite3.v141_xp.props" />
             默认 WxSqlite3UseDll=true：会定义 WXUSINGDLL 并链接 wx 导入库；运行目录需含 wxsqlite3.dll 及 wx 的 vc14x DLL。

          仅静态 wxSQLite3（WxSqlite3UseDll=false）时，仍需自行配置 wx 静态库与链接项。

          上游：$repo  引用 $ref
          "@
          $readme.Trim() | Set-Content -LiteralPath (Join-Path $dist 'README.txt') -Encoding utf8

      - name: Zip distribution for GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $src = Join-Path $env:GITHUB_WORKSPACE 'dist/wxsqlite3-v141_xp'
          $tag = $env:GITHUB_REF_NAME
          if (-not $tag) { throw "GITHUB_REF_NAME empty" }
          $zip = Join-Path $env:GITHUB_WORKSPACE "wxsqlite3-v141_xp-$tag.zip"
          if (Test-Path $zip) { Remove-Item -LiteralPath $zip -Force }
          Compress-Archive -Path (Join-Path $src '*') -DestinationPath $zip -CompressionLevel Optimal

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/wxsqlite3-v141_xp-${{ github.ref_name }}.zip
          generate_release_notes: true

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxsqlite3-v141_xp-win32-x64-dist
          path: |
            dist/wxsqlite3-v141_xp/**
