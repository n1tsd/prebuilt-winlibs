# Build wxSQLite3 for Win32 and x64 using MSVC platform toolset v141_xp (the VS 2017-level
# toolset variant installed with VS 2019). wxWidgets is built with the same toolset first.
# Runner: windows-2019 ships Visual Studio 2019; v141 + WinXP pack components are added via
# Visual Studio Installer when missing.

name: wxSQLite3 Windows v141_xp

on:
  workflow_dispatch:

env:
  WXSQLITE3_REPO: utelle/wxsqlite3
  WXSQLITE3_REF: master
  # wxWidgets 3.2.10 (git tag v3.2.10); set to a branch name if you track a fork
  WXWIDGETS_REF: v3.2.10

jobs:
  build:
    runs-on: windows-2019
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout wxSQLite3
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WXSQLITE3_REPO }}
          ref: ${{ env.WXSQLITE3_REF }}
          path: wxsqlite3

      - name: Install MSVC v141 and matching toolset add-on (vs_installer)
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found" }
          $installPath = & $vswhere -latest -version "[16.0,17.0)" -products * -property installationPath
          if (-not $installPath) { throw "Visual Studio 2019 not found. Use runs-on: windows-2019." }
          Write-Host "VS install path: $installPath"
          $installer = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vs_installer.exe"
          $proc = Start-Process -FilePath $installer -ArgumentList @(
            "modify",
            "--installPath", $installPath,
            "--add", "Microsoft.VisualStudio.Component.VC.v141.x86.x64",
            "--add", "Microsoft.VisualStudio.Component.WinXP",
            "--quiet", "--wait", "--norestart"
          ) -Wait -PassThru
          if ($proc.ExitCode -notin 0, 3010) {
            throw "vs_installer modify failed with exit code $($proc.ExitCode)"
          }

      - name: Checkout wxWidgets
        uses: actions/checkout@v4
        with:
          repository: wxWidgets/wxWidgets
          ref: ${{ env.WXWIDGETS_REF }}
          path: wxWidgets

      - name: Write wx_local.props (vc_lib / vc_x64_lib layout)
        shell: pwsh
        run: |
          $xml = @'
          <?xml version="1.0" encoding="utf-8"?>
          <Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <PropertyGroup Label="UserMacros">
              <wxCompilerPrefix>vc</wxCompilerPrefix>
              <wxMsvcVersionAuto></wxMsvcVersionAuto>
            </PropertyGroup>
          </Project>
          '@
          $xml | Set-Content -Encoding utf8 -Path "$env:GITHUB_WORKSPACE/wxsqlite3/build/wx_local.props"

      - name: Build wxWidgets and wxSQLite3 (Win32 + x64, toolset v141_xp)
        shell: cmd
        run: |
          set WXWIN=%GITHUB_WORKSPACE%\wxWidgets
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set VS_INST=%%i
          if not defined VS_INST ( echo vswhere failed & exit /b 1 )

          call "%VS_INST%\VC\Auxiliary\Build\vcvars32.bat"
          msbuild wxWidgets\build\msw\wx_vc16.sln /m /verbosity:minimal /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v141_xp
          if errorlevel 1 exit /b 1

          call "%VS_INST%\VC\Auxiliary\Build\vcvars64.bat"
          msbuild wxWidgets\build\msw\wx_vc16.sln /m /verbosity:minimal /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v141_xp
          if errorlevel 1 exit /b 1

          call "%VS_INST%\VC\Auxiliary\Build\vcvars32.bat"
          msbuild wxsqlite3\build\wxsqlite3_vc15.sln /m /verbosity:minimal /t:wxsqlite3 /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v141_xp
          if errorlevel 1 exit /b 1

          call "%VS_INST%\VC\Auxiliary\Build\vcvars64.bat"
          msbuild wxsqlite3\build\wxsqlite3_vc15.sln /m /verbosity:minimal /t:wxsqlite3 /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v141_xp
          if errorlevel 1 exit /b 1

      - name: Upload lib output
        uses: actions/upload-artifact@v4
        with:
          name: wxsqlite3-v141_xp-Release-static-lib
          path: |
            wxsqlite3/lib/**
